<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사회연대은행 사업구조</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    font-family: 'Pretendard', sans-serif;
    background: #181818;
  }

  /* ── Floating version toggle ── */
  .vtoggle {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(24, 24, 24, 0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px;
    padding: 5px 6px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.06) inset;
    user-select: none;
  }

  .vtoggle-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    padding: 0 6px 0 4px;
  }

  .vbtn {
    position: relative;
    padding: 7px 18px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.2px;
    color: rgba(255,255,255,0.45);
    background: transparent;
    transition: color 0.2s ease;
    white-space: nowrap;
  }

  .vbtn.active {
    color: #ffffff;
    background: #2d6ab2;
    box-shadow: 0 2px 10px rgba(45,106,178,0.5);
  }

  .vbtn:not(.active):hover {
    color: rgba(255,255,255,0.75);
    background: rgba(255,255,255,0.07);
  }

  .vdiv {
    width: 1px;
    height: 16px;
    background: rgba(255,255,255,0.12);
  }

  /* ── Iframe ── */
  #frame {
    display: block;
    width: 100vw;
    height: 100vh;
    border: none;
    background: #ffffff;
    /* fade transition */
    transition: opacity 0.25s ease;
  }

  #frame.fading { opacity: 0; }

  /* ── Loading indicator ── */
  .loader {
    position: fixed;
    inset: 0;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 8000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .loader.show {
    opacity: 1;
    pointer-events: all;
  }
  .loader-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #2d6ab2;
    animation: pulse 1s ease-in-out infinite;
  }
  .loader-dot:nth-child(2) { animation-delay: 0.15s; margin: 0 6px; }
  .loader-dot:nth-child(3) { animation-delay: 0.30s; }

  @keyframes pulse {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<!-- Version Toggle -->
<div class="vtoggle">
  <span class="vtoggle-label">Ver</span>
  <button class="vbtn" id="btn1" onclick="switchTo(1)">1.0</button>
  <div class="vdiv"></div>
  <button class="vbtn active" id="btn2" onclick="switchTo(2)">2.0</button>
</div>

<!-- Loading dots -->
<div class="loader" id="loader">
  <div class="loader-dot"></div>
  <div class="loader-dot"></div>
  <div class="loader-dot"></div>
</div>

<!-- Full-viewport iframe -->
<iframe id="frame" src="./v2/index.html" title="사회연대은행 사업구조"></iframe>

<script>
  let current = 2;
  const frame = document.getElementById('frame');
  const loader = document.getElementById('loader');

  function switchTo(v) {
    if (v === current) return;
    current = v;

    // update buttons
    document.getElementById('btn1').classList.toggle('active', v === 1);
    document.getElementById('btn2').classList.toggle('active', v === 2);

    // fade out → switch → fade in
    frame.classList.add('fading');
    loader.classList.add('show');

    setTimeout(() => {
      frame.src = `./v${v}/index.html`;
    }, 200);
  }

  frame.addEventListener('load', () => {
    frame.classList.remove('fading');
    loader.classList.remove('show');
  });

  // preserve scroll position per version (optional enhancement)
  const scrollPos = { 1: 0, 2: 0 };
</script>
</body>
</html>
